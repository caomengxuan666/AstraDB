# AstraDB Redis Mode Configuration
# Traditional Redis-compatible mode with RDB + AOF + RocksDB cold data storage
# This mode provides maximum compatibility with Redis tools and clients

[server]
host = "0.0.0.0"
port = 6379
max_connections = 10000
thread_count = 12
use_per_worker_io = true
use_so_reuseport = true

[database]
num_databases = 16
num_shards = 16

[logging]
level = "debug"
file = "astradb.log"
async = true
queue_size = 8192

[performance]
enable_pipeline = true
enable_compression = false

[async]
use_async_commands = true

# Storage Configuration - Redis Mode
[storage]
mode = "redis"
enable_rocksdb_cold_data = true
enable_compression = true
compression_type = "zlib"

[storage.redis_mode]
# RDB Configuration
rdb_enabled = true
rdb_path = "./data/dump.rdb"
rdb_auto_save = false
rdb_save_interval = 300

# AOF Configuration
aof_enabled = false
aof_path = "./data/aof/appendonly.aof"
aof_sync_everysec = true

[metrics]
enabled = true
bind_addr = "0.0.0.0"
port = 9100
endpoint = "/metrics"
stats_frequency_seconds = 10

[cluster]
enabled = false

[memory]
max_memory = 0
eviction_policy = "noeviction"
eviction_threshold = 0.9
eviction_samples = 5
enable_tracking = true

[replication]
enabled = false

[acl]
enabled = false