name: Release Build and Package

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  build-and-package:
    name: Build and Package for ${{ matrix.os }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-package-clang
            package_preset: linux-clang-deb
            package_preset2: linux-clang-tgz
          - os: windows-latest
            preset: windows-package-msvc
            package_preset: windows-msvc-zip
            package_preset2: windows-msvc-msi

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build clang clang-format
        timeout-minutes: 5

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake ninja
        shell: pwsh
        timeout-minutes: 5

      - name: Configure CMake
        run: |
          cmake --preset ${{ matrix.preset }}
        timeout-minutes: 10

      - name: Build
        run: |
          cmake --build --preset ${{ matrix.preset }} --config Release -j4
        timeout-minutes: 30

      - name: Package (primary)
        if: matrix.package_preset != null
        run: |
          cpack --preset ${{ matrix.package_preset }}
        timeout-minutes: 10

      - name: Package (secondary)
        if: matrix.package_preset2 != null
        run: |
          cpack --preset ${{ matrix.package_preset2 }}
        timeout-minutes: 10

      - name: List generated packages
        run: |
          if [ -d "dist" ]; then
            ls -la dist/
          else
            echo "No dist directory found"
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: astradb-${{ matrix.os }}-${{ matrix.preset }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.deb
            dist/*.rpm
            dist/*.msi
            dist/*.exe
          if-no-files-found: warn

  release:
    name: Create Release
    needs: [build-and-package]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: |
          ls -R release-artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
            release-artifacts/**/*.deb
            release-artifacts/**/*.rpm
            release-artifacts/**/*.msi
            release-artifacts/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}